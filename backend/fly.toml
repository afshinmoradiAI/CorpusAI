# Rename `app` to whatever you like — must be globally unique on fly.io.
# `fly launch` will offer to set this for you.
app = "corpusai-backend"
primary_region = "syd"  # change to your closest fly region (e.g. iad, fra, nrt)

[build]

[env]
  LOG_LEVEL = "INFO"
  DATA_DIR = "/data"
  # ANTHROPIC_API_KEY, APP_API_KEY, CORS_ALLOWED_ORIGINS are set via
  # `fly secrets set` — never commit them.

# Persistent SQLite store. Create with:
#   fly volumes create corpusai_data --size 1 --region <your-region>
[mounts]
  source = "corpusai_data"
  destination = "/data"

# One always-on machine. SQLite is local to the volume, so horizontal
# scaling needs a different storage backend (e.g. Postgres).
[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "20s"
  method = "GET"
  path = "/health"

# 1 GB is enough for ~30 PDFs in memory plus the BM25 indexes.
# Bump to 2gb if you start hitting OOM on large reference sets.
[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
